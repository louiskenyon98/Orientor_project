[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements-simple.txt"

[deploy]
startCommand = "cd backend && python main_deploy.py"
restartPolicyType = "on_failure"

[phases.setup]
nixPkgs = ["python311"]

[phases.build]
cmds = [
    "python -m pip install --upgrade pip",
    "pip install -r requirements-simple.txt"
]